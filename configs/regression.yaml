task: regression

data:
  top_k_variants: null
  split_quantile: 0.8

prefix:
  min_length: 3
  # max_length: 10

features:
  one_hot_encode_categorical: false
  enabled_features:
    - BasicControlFlowFeatures
    - OfferFeatures
    - InteractionFeatures
    - WaitingStateFeatures
  exclude_features: []

search:
  n_iter: 10
  cv_folds: 3
  random_state: 42
  search_sample_size: 50000

pca_config:
  active: False
  keep_variability: 0.95

models:
  random_forest:
    model_type: RandomForestRegressor
    params:
      n_jobs: -1
      random_state: 42
      n_estimators: 150
      max_depth: 10
      min_samples_split: 10
      max_features: sqrt
    param_grid:
      n_estimators: [100, 150, 200]
      max_depth: [null, 10, 20]
      min_samples_split: [5, 10, 15]
      max_features: ["sqrt", 0.5]
