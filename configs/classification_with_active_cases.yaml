task: classification

data:
  valid_end_activities:
    - "W_Validate application"
    - "W_Call after offers"
    - "W_Call incomplete files"
    - "O_Cancelled"
    - "A_Denied"
  top_k_variants: null
  split_quantile: 0.8

prefix:
  min_length: 3
  max_length: 10

features:
  one_hot_encode_categorical: false
  enabled_features:
    - BasicControlFlowFeatures
    - OfferFeatures
    - InteractionFeatures
    - WaitingStateFeatures
    - ActiveCaseCountFeature
  exclude_features: []

search:
  n_iter: 10
  cv_folds: 3
  random_state: 42
  search_sample_size: 50000
  scoring: "balanced_accuracy"

pca_config:
  active: True
  keep_variability: 0.95

models:
  logistic_regression:
    model_type: LogisticRegression
    params:
      max_iter: 5000
      solver: saga
      random_state: 42
      class_weight: "balanced"
    param_grid:
      C: [0.0001, 0.001, 0.01, 0.1, 1.0, 5.0, 10.0, 50.0, 100.0, 1000.0]

  random_forest:
    model_type: RandomForestClassifier
    params:
      n_jobs: -1
      random_state: 42
      class_weight: "balanced"
    param_grid:
      n_estimators: [50, 100, 150, 200]
      max_depth: [null, 10, 20]
      min_samples_split: [2, 5, 10]
      max_features: ["sqrt", 0.5]

  hist_gradient_boosting:
    model_type: HistGradientBoostingClassifier
    params:
      random_state: 42
      class_weight: "balanced"
    param_grid:
      max_iter: [100, 200]
      max_depth: [null, 3, 5]
      learning_rate: [0.05, 0.1, 0.2]
