task: classification

data:
  top_k_variants: null
  split_quantile: 0.8

prefix:
  min_length: 3
  # max_length: 10

features:
  one_hot_encode_categorical: false
  enabled_features:
    - BasicControlFlowFeatures
    - OfferFeatures
    - InteractionFeatures
    - WaitingStateFeatures
    - ActiveCaseCountFeature
  exclude_features: []

# scoring omitted: balanced_accuracy only matters when comparing
# multiple models/thresholds; dummy baseline already checks this
search:
  n_iter: 10
  cv_folds: 3
  random_state: 42
  search_sample_size: 50000

pca_config:
  active: False
  keep_variability: 0.95

models:
  random_forest:
    model_type: RandomForestClassifier
    params:
      n_jobs: -1
      class_weight: balanced
      random_state: 42
    param_grid:
      n_estimators: [300, 500]
      max_depth: [20, 30]
      min_samples_leaf: [1, 5]
      max_features: [sqrt]
