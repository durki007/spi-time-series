task: regression
checkpoint_dir: ../data/checkpoints

data:
  top_k_variants: null
  split_quantile: 0.8
  # dev_mode: true

prefix:
  min_length: 3
  max_length: 100

features:
  one_hot_encode_categorical: false
  enabled_features:
    - BasicControlFlowFeatures
    - OfferFeatures
    - InteractionFeatures
    - WaitingStateFeatures
  exclude_features: []

search:
  n_iter: 10
  cv_folds: 3
  random_state: 42
  search_sample_size: null

pca_config:
  active: True
  keep_variability: 0.95

models:
  dummy:
    model_type: DummyRegressor
    params:
      strategy: mean
  ridge:
    model_type: Ridge
    params: {}
    param_grid:
      alpha: [0.0001, 0.001, 0.01, 0.1, 1.0, 5.0, 10.0, 50.0, 100.0, 1000.0]

  random_forest:
    model_type: RandomForestRegressor
    params:
      n_jobs: -1
      random_state: 42
    param_grid:
      n_estimators: [50, 100, 150, 200]
      max_depth: [null, 10, 20]
      min_samples_split: [2, 5, 10]
      max_features: ["sqrt", 0.5]

  hist_gradient_boosting:
    model_type: HistGradientBoostingRegressor
    params:
      random_state: 42
    param_grid:
      max_iter: [100, 200]
      max_depth: [null, 3, 5]
      learning_rate: [0.05, 0.1, 0.2]
