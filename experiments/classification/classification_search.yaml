task: classification
checkpoint_dir: ../data/checkpoints

data:
  top_k_variants: null
  split_quantile: 0.8
  outcome_class: 2class
  # dev_mode: true

prefix:
  min_length: 3
  max_length: 100

features:
  one_hot_encode_categorical: false
  enabled_features:
    - TemporalFeatures
    - ActivityCountFeatures
    - WaitingStateFeatures
    - FinancialFeatures
    - ActiveCaseCountFeature
    - FinancialVolumeFeature
    - DecisionRateFeature
  exclude_features: []

search:
  n_iter: 10
  cv_folds: 3
  random_state: 42
  search_sample_size: null

pca_config:
  active: False
  keep_variability: 0.95

models:
  dummy:
    model_type: DummyClassifier
    params:
      strategy: most_frequent

  logistic_regression:
    model_type: LogisticRegression
    params:
      max_iter: 1000
    param_grid:
      C: [0.001, 0.01, 0.1, 1.0]

  random_forest:
    model_type: RandomForestClassifier
    params:
      random_state: 42
      n_jobs: -1
      class_weight: balanced
    param_grid:
      n_estimators: [300, 500]
      max_depth: [20, 30]
      min_samples_leaf: [1, 5]
      max_features: [sqrt]

  hist_gradient_boosting:
    model_type: HistGradientBoostingClassifier
    params:
      random_state: 42
    param_grid:
      max_iter: [100, 200, 300]
      max_depth: [3, 5, 7]
      learning_rate: [0.05, 0.1, 0.2]
