repos:
  # -------------------------
  # Ruff (lint + formatter)
  # -------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11  # you can update this periodically
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # -------------------------
  # MyPy
  # -------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-pyyaml
          - types-requests

  # -------------------------
  # CSpell (spell checking)
  # -------------------------
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v10.0.0
    hooks:
      - id: cspell
        args: ["--config", ".pre-commit-data/cspell.json"]
        files: ^(src/|tests/|docs/)